function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function buildReport(workout,lastSession){
  if(!lastSession||!lastSession.sets) return null;
  return workout.exercises.map((ex,i)=>{
    const prevSets=(lastSession.sets[i]||[]).filter(s=>s.done&&s.weight&&s.reps);
    if(!prevSets.length) return {name:ex.name,msg:"No data from last session — start conservative.",color:C.muted,weight:null};
    const weights=prevSets.map(s=>parseFloat(s.weight));
    const reps=prevSets.map(s=>parseInt(s.reps));
    const avgW=weights.reduce((a,b)=>a+b,0)/weights.length;
    const isUpper=workout.id.includes("upper");
    const inc=isUpper?2.5:5;
    const allTop=reps.every(r=>r>=ex.repMax);
    const mostTop=reps.filter(r=>r>=ex.repMax).length>=Math.ceil(reps.length*0.75);
    const someBelow=reps.some(r=>r<ex.repMin);
    const minR=Math.min(...reps); const maxR=Math.max(...reps);
    if(allTop) return {name:ex.name,msg:`All sets hit ${ex.repMax} reps @ ${avgW} lb — go to ${avgW+inc} lb today. 🔼`,color:C.accent,weight:avgW+inc};
    if(mostTop) return {name:ex.name,msg:`Most sets hit top reps @ ${avgW} lb — try ${avgW+inc} lb. 📈`,color:C.green,weight:avgW+inc};
    if(someBelow) return {name:ex.name,msg:`Some sets dropped below ${ex.repMin} reps @ ${avgW} lb — stay at ${avgW} lb, fix form first. 🎯`,color:C.gold,weight:avgW};
    return {name:ex.name,msg:`Hit ${minR}–${maxR} reps @ ${avgW} lb — stay at ${avgW} lb, push for ${ex.repMax} every set. 💪`,color:C.blue,weight:avgW};
  });
}

function Badge({tag,color}){
  return <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"3px 8px",borderRadius:4,border:`1px solid ${color}33`,color,background:`${color}15`}}>{tag}</span>;
}

function RestTimer({seconds,onDone}){
  const [left,setLeft]=useState(seconds);
  const ref=useRef();
  useEffect(()=>{
    ref.current=setInterval(()=>setLeft(t=>{if(t<=1){clearInterval(ref.current);onDone&&onDone();return 0;}return t-1;}),1000);
    return()=>clearInterval(ref.current);
  },[]);
  const R=26;const circ=2*Math.PI*R;const pct=left/seconds;
  const m=Math.floor(left/60);const s=String(left%60).padStart(2,"0");
  return(
    <div style={{display:"flex",alignItems:"center",gap:12,background:`${C.red}18`,border:`1px solid ${C.red}40`,borderRadius:10,padding:"10px 14px",animation:"slideUp 0.2s ease"}}>
      <div style={{position:"relative",width:56,height:56,flexShrink:0}}>
        <svg width="56" height="56" style={{transform:"rotate(-90deg)"}}>
          <circle cx="28" cy="28" r={R} fill="none" stroke={C.dimmed} strokeWidth="4"/>
          <circle cx="28" cy="28" r={R} fill="none" stroke={C.red} strokeWidth="4" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:C.red}}>{m>0?`${m}:${s}`:`${left}s`}</div>
      </div>
      <div style={{flex:1}}>
        <div style={{color:C.red,fontWeight:700,fontSize:13}}>Rest Timer</div>
        <div style={{color:C.muted,fontSize:12,marginTop:1}}>Next set in {m>0?`${m}:${s}`:`${left}s`}</div>
      </div>
      <button onClick={onDone} style={{background:C.dimmed,border:"none",color:C.muted,borderRadius:7,padding:"7px 12px",fontSize:12,cursor:"pointer",fontWeight:700}}>Skip</button>
    </div>
  );
}

function WeightTracker({bwLog,onAdd}){
  const [input,setInput]=useState("");
  const sorted=[...bwLog].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const recent=sorted.slice(-8);
  const handleAdd=()=>{const v=parseFloat(input);if(!v||v<50||v>500)return;onAdd({date:new Date().toISOString().split("T")[0],weight:v});setInput("");};
  const trend=recent.length>=2?(recent[recent.length-1].weight-recent[0].weight).toFixed(1):null;
  const maxW=recent.length?Math.max(...recent.map(r=>r.weight)):0;
  const minW=recent.length?Math.min(...recent.map(r=>r.weight)):0;
  const range=maxW-minW||1;
  return(
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{background:`linear-gradient(135deg,${C.green}22,transparent)`,border:`1px solid ${C.green}30`,borderRadius:14,padding:"18px",marginBottom:16}}>
        <div style={{fontSize:12,color:C.green,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Body Weight</div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.6}}>Log weekly weigh-ins — same time every week, morning before eating, for consistency.</div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:16,display:"flex",gap:10,alignItems:"center"}}>
        <input type="number" placeholder="Weight (lb)" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAdd()}
          style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",color:C.text,fontSize:15,fontWeight:600}}/>
        <button onClick={handleAdd} style={{background:C.accent,border:"none",color:C.bg,fontWeight:800,fontSize:13,padding:"10px 20px",borderRadius:8,cursor:"pointer"}}>Log</button>
      </div>
      {recent.length>1&&(
        <>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:14}}>
            <span style={{fontSize:28}}>{trend>0?"📈":trend<0?"📉":"➡️"}</span>
            <div>
              <div style={{fontWeight:800,fontSize:20,color:trend<=0?C.accent:C.gold}}>{trend>0?"+":""}{trend} lb</div>
              <div style={{fontSize:12,color:C.muted}}>since {new Date(recent[0].date+"T12:00:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"})}</div>
            </div>
            <div style={{marginLeft:"auto",textAlign:"right"}}>
              <div style={{fontWeight:800,fontSize:18,color:C.text}}>{recent[recent.length-1].weight} lb</div>
              <div style={{fontSize:12,color:C.muted}}>current</div>
            </div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px",marginBottom:16}}>
            <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:12}}>Trend</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:5,height:72}}>
              {recent.map((r,i)=>{
                const h=Math.max(8,((r.weight-minW)/range)*56+8);
                const isLatest=i===recent.length-1;
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{width:"100%",height:h,background:isLatest?C.accent:`${C.green}55`,borderRadius:"3px 3px 0 0",transition:"height 0.3s"}}/>
                    <div style={{fontSize:9,color:C.muted,textAlign:"center"}}>{new Date(r.date+"T12:00:00").toLocaleDateString("en-CA",{month:"numeric",day:"numeric"})}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}
      {sorted.slice().reverse().slice(0,10).map((r,i)=>(
        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,color:C.muted}}>{new Date(r.date+"T12:00:00").toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"})}</div>
          <div style={{fontWeight:800,fontSize:16,color:C.text}}>{r.weight} <span style={{fontSize:12,color:C.muted,fontWeight:400}}>lb</span></div>
        </div>
      ))}
      {!bwLog.length&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:C.muted}}>
          <div style={{fontSize:36,marginBottom:12}}>⚖️</div>
          <div style={{fontSize:14,color:C.text,fontWeight:700,marginBottom:6}}>No weigh-ins yet</div>
          <div style={{fontSize:13,lineHeight:1.6}}>Log your first weight above. Once a week, same conditions.</div>
        </div>
      )}
    </div>
  );
}

function GuidedRoutine({onClose,onComplete}){
  const [step,setStep]=useState(0);
  const [timeLeft,setTimeLeft]=useState(morningMoves[0].duration);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef();
  const move=morningMoves[step];
  useEffect(()=>{setTimeLeft(morningMoves[step].duration);setRunning(false);clearInterval(ref.current);},[step]);
  useEffect(()=>{if(running){ref.current=setInterval(()=>setLeft(t=>{if(t<=1){clearInterval(ref.current);setRunning(false);return 0;}return t-1;}),1000);}else clearInterval(ref.current);return()=>clearInterval(ref.current);},[running]);
  // use separate setLeft alias
  const setLeft=(fn)=>setTimeLeft(fn);
  const R=54;const circ=2*Math.PI*R;
  const pct=1-timeLeft/move.duration;
  const m=Math.floor(timeLeft/60);const s=String(timeLeft%60).padStart(2,"0");
  const next=()=>{if(step<morningMoves.length-1)setStep(st=>st+1);else{setDone(true);onComplete&&onComplete();}};
  if(done) return(
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,animation:"fadeIn 0.4s ease"}}>
      <div style={{fontSize:72,marginBottom:24}}>🌅</div>
      <div style={{fontSize:28,fontWeight:800,color:C.text,marginBottom:12}}>Morning complete.</div>
      <div style={{fontSize:15,color:C.muted,textAlign:"center",lineHeight:1.7,marginBottom:40}}>You gave your body what it needed before the day even started.</div>
      <button onClick={onClose} style={{background:C.accent,border:"none",color:C.bg,fontWeight:800,fontSize:16,padding:"16px 40px",borderRadius:14,cursor:"pointer"}}>Done</button>
    </div>
  );
  return(
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:200,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,background:C.surface,flexShrink:0}}>
        <button onClick={onClose} style={{background:C.dimmed,border:"none",color:C.muted,width:36,height:36,borderRadius:8,cursor:"pointer",fontSize:16}}>✕</button>
        <div style={{flex:1}}><div style={{fontWeight:800,fontSize:15,color:C.text}}>Morning Flow</div><div style={{fontSize:11,color:C.muted}}>Move {step+1} of {morningMoves.length}</div></div>
        <div style={{display:"flex",gap:4}}>{morningMoves.map((_,i)=><div key={i} style={{width:i===step?16:6,height:6,borderRadius:3,background:i<step?C.accent:i===step?C.purple:C.dimmed,transition:"all 0.3s"}}/>)}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"24px 20px 40px"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:56,marginBottom:12}}>{move.emoji}</div>
          <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:8}}>{move.name}</div>
          <Badge tag={move.category} color={C.purple}/>
        </div>
        <div style={{display:"flex",justifyContent:"center",marginBottom:28}}>
          <div style={{position:"relative",width:140,height:140}}>
            <svg width="140" height="140" style={{transform:"rotate(-90deg)"}}>
              <circle cx="70" cy="70" r={R} fill="none" stroke={C.dimmed} strokeWidth="6"/>
              <circle cx="70" cy="70" r={R} fill="none" stroke={running?C.purple:C.muted} strokeWidth="6" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear,stroke 0.3s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:30,fontWeight:800,color:running?C.text:C.muted}}>{m>0?`${m}:${s}`:`${timeLeft}s`}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>remaining</div>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:28}}>
          <button onClick={()=>setRunning(r=>!r)} style={{background:running?`${C.purple}22`:C.purple,border:`1px solid ${C.purple}60`,color:running?C.purple:C.bg,fontWeight:800,fontSize:14,padding:"12px 28px",borderRadius:10,cursor:"pointer"}}>
            {running?"⏸ Pause":timeLeft<move.duration?"▶ Resume":"▶ Start"}
          </button>
          <button onClick={next} style={{background:C.card,border:`1px solid ${C.border}`,color:C.muted,fontWeight:700,fontSize:14,padding:"12px 20px",borderRadius:10,cursor:"pointer"}}>{step<morningMoves.length-1?"Skip →":"Finish ✓"}</button>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px",marginBottom:12}}>
          <div style={{color:C.purple,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>How to do it</div>
          <div style={{color:C.text,fontSize:14,lineHeight:1.7}}>{move.description}</div>
        </div>
        <div style={{background:`${C.accent}0E`,border:`1px solid ${C.accent}25`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <div style={{color:C.accent,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Cue</div>
          <div style={{color:C.text,fontSize:13,lineHeight:1.5}}>{move.cue}</div>
        </div>
        <div style={{background:`${C.gold}0E`,border:`1px solid ${C.gold}25`,borderRadius:12,padding:"14px 16px"}}>
          <div style={{color:C.gold,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Why it matters</div>
          <div style={{color:C.text,fontSize:13,lineHeight:1.5}}>{move.benefit}</div>
        </div>
      </div>
    </div>
  );
}

function LogModal({workout,existingLog,draft,onDraftChange,onSave,onClose}){
  const today=new Date().toISOString().split("T")[0];
  const [date,setDate]=useState(draft?.date||existingLog?.date||today);
  const [notes,setNotes]=useState(draft?.notes||existingLog?.notes||"");
  const [energy,setEnergy]=useState(draft?.energy||existingLog?.energy||3);
  const [sets,setSets]=useState(()=>{
    if(draft?.sets) return draft.sets;
    if(existingLog?.sets) return existingLog.sets;
    return workout.exercises.map(ex=>Array.from({length:ex.sets},()=>({weight:"",reps:"",done:false})));
  });
  const [activeTimer,setActiveTimer]=useState(null);

  useEffect(()=>{ onDraftChange({date,notes,energy,sets}); },[JSON.stringify({date,notes,energy,sets})]);

  const updateSet=(exI,setI,field,val)=>{
    setSets(prev=>{const next=prev.map(e=>[...e]);next[exI]=next[exI].map((s,i)=>i===setI?{...s,[field]:val}:s);return next;});
  };
  const toggleDone=(exI,setI)=>{
    setSets(prev=>{
      const next=prev.map(e=>[...e]);
      const wasDone=next[exI][setI].done;
      next[exI]=next[exI].map((s,i)=>i===setI?{...s,done:!s.done}:s);
      if(!wasDone) setActiveTimer({seconds:workout.exercises[exI].rest});
      return next;
    });
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,background:C.surface,flexShrink:0}}>
        <button onClick={onClose} style={{background:C.dimmed,border:"none",color:C.muted,width:36,height:36,borderRadius:8,cursor:"pointer",fontSize:16}}>✕</button>
        <div style={{flex:1}}><div style={{fontWeight:800,fontSize:16,color:C.text}}>Log Session</div><div style={{fontSize:12,color:C.muted}}>{workout.day}</div></div>
        <button onClick={()=>onSave({date,notes,sets,energy})} style={{background:C.accent,border:"none",color:C.bg,fontWeight:800,fontSize:13,padding:"8px 16px",borderRadius:8,cursor:"pointer"}}>Save</button>
      </div>
      {activeTimer&&(
        <div style={{padding:"8px 16px",background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <RestTimer seconds={activeTimer.seconds} onDone={()=>setActiveTimer(null)}/>
        </div>
      )}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Date</div>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Energy (1–5)</div>
            <div style={{display:"flex",gap:4}}>{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setEnergy(n)} style={{flex:1,height:38,background:energy>=n?`${C.gold}30`:C.card,border:`1px solid ${energy>=n?C.gold+"60":C.border}`,borderRadius:6,color:energy>=n?C.gold:C.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>{n}</button>)}</div>
          </div>
        </div>
        {workout.exercises.map((ex,exI)=>(
          <div key={exI} style={{marginBottom:14,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:700,color:C.text,fontSize:13}}>{ex.name}</div>
              <div style={{fontSize:11,color:C.muted}}>{ex.sets} × {ex.reps}</div>
            </div>
            <div style={{padding:"10px 14px"}}>
              <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 36px",gap:6,marginBottom:6}}>
                <div style={{fontSize:10,color:C.muted,textAlign:"center"}}>#</div>
                <div style={{fontSize:10,color:C.muted,textAlign:"center"}}>WEIGHT</div>
                <div style={{fontSize:10,color:C.muted,textAlign:"center"}}>REPS</div>
                <div/>
              </div>
              {sets[exI].map((s,setI)=>(
                <div key={setI} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 36px",gap:6,marginBottom:6,alignItems:"center"}}>
                  <div style={{textAlign:"center",fontSize:12,fontWeight:700,color:s.done?C.accent:C.muted}}>{setI+1}</div>
                  <input type="number" placeholder="lb" value={s.weight} onChange={e=>updateSet(exI,setI,"weight",e.target.value)} style={{background:C.surface,border:`1px solid ${s.done?C.accent+"40":C.border}`,borderRadius:7,padding:"9px 10px",color:C.text,fontSize:14,fontWeight:600,textAlign:"center",width:"100%"}}/>
                  <input type="number" placeholder="reps" value={s.reps} onChange={e=>updateSet(exI,setI,"reps",e.target.value)} style={{background:C.surface,border:`1px solid ${s.done?C.accent+"40":C.border}`,borderRadius:7,padding:"9px 10px",color:C.text,fontSize:14,fontWeight:600,textAlign:"center",width:"100%"}}/>
                  <button onClick={()=>toggleDone(exI,setI)} style={{width:36,height:36,borderRadius:8,border:`1px solid ${s.done?C.accent+"60":C.border}`,background:s.done?`${C.accent}25`:C.surface,color:s.done?C.accent:C.muted,cursor:"pointer",fontSize:14}}>✓</button>
                </div>
              ))}
            </div>
          </div>
        ))}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Session Notes</div>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="How did it feel? Any PRs? Anything to note..." rows={3} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:13,lineHeight:1.5,resize:"none"}}/>
        </div>
      </div>
    </div>
  );
}

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🕐</span>
          <div><div style={{fontSize:12,color:C.muted}}>Last session</div><div style={{fontSize:13,fontWeight:600,color:C.text}}>{new Date(lastSession.date+"T12:00:00").toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"})}</div></div>
        </div>
      )}
      {workout.exercises.map((ex,i)=><ExerciseCard key={i} ex={ex} index={i} recommendation={report?report[i]:null}/>)}
    </div>
  );
}

function HistoryView({logs}){
  const all=Object.entries(logs).filter(([k])=>k!=="morning").flatMap(([wId,sessions])=>sessions.map(s=>({...s,workout:workouts.find(w=>w.id===wId)}))).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const ml=(logs["morning"]||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!all.length&&!ml.length) return(
    <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
      <div style={{fontSize:48,marginBottom:16}}>📋</div>
      <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:8}}>No sessions yet</div>
      <div style={{fontSize:13,lineHeight:1.6}}>Log a workout or complete your morning flow to see history here.</div>
    </div>
  );
  return(
    <div>
      {ml.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:C.muted,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>🌅 Morning Flow · {ml.length} completed</div>
          {ml.slice(0,5).map((l,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:20}}>🌅</span>
              <div style={{flex:1}}><div style={{fontWeight:700,color:C.text,fontSize:13}}>Morning Flow</div><div style={{fontSize:12,color:C.muted}}>{new Date(l.date+"T12:00:00").toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"})}</div></div>
              <div style={{fontSize:16,color:C.purple}}>✓</div>
            </div>
          ))}
        </div>
      )}
      {all.length>0&&(
        <div>
          <div style={{fontSize:12,color:C.muted,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>🏋️ Gym Sessions · {all.length} logged</div>
          {all.map((s,i)=>{
            const w=s.workout; if(!w) return null;
            const done=s.sets?s.sets.flat().filter(x=>x.done).length:0;
            const total=s.sets?s.sets.flat().length:0;
            return(
              <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>{w.emoji}</span><div><div style={{fontWeight:700,color:C.text,fontSize:14}}>{w.day}</div><div style={{fontSize:12,color:C.muted}}>{new Date(s.date+"T12:00:00").toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"})}</div></div></div>
                  <div style={{fontSize:12,color:C.gold}}>{"★".repeat(s.energy||0)}</div>
                </div>
                <div><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,color:C.muted}}>Sets completed</span><span style={{fontSize:11,color:done===total?C.accent:C.muted,fontWeight:700}}>{done}/{total}</span></div><div style={{height:4,background:C.dimmed,borderRadius:2}}><div style={{height:"100%",width:`${total?(done/total)*100:0}%`,background:done===total?C.accent:C.blue,borderRadius:2}}/></div></div>
                {s.notes&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic",marginTop:8,lineHeight:1.5}}>"{s.notes}"</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App(){
  const [view,setView]=useState("home");
  const [logs,setLogs]=useState(()=>load("myplan-logs-v3",{}));
  const [bwLog,setBwLog]=useState(()=>load("myplan-bw-v1",[]));
  const [logModal,setLogModal]=useState(null);
  const [logDraft,setLogDraft]=useState(()=>load("myplan-draft-v1",{}));

  const activeWorkout=workouts.find(w=>w.id===view);
  const allGymSessions=Object.entries(logs).filter(([k])=>k!=="morning").flatMap(([,v])=>v);
  const showDeload=allGymSessions.length>=24;
  const totalGym=allGymSessions.length;
  const totalMorning=(logs["morning"]||[]).length;

  const saveLog=(workoutId,data)=>{
    const updated={...logs,[workoutId]:[...(logs[workoutId]||[]),data]};
    setLogs(updated);save("myplan-logs-v3",updated);
    const nd={...logDraft};delete nd[workoutId];
    setLogDraft(nd);save("myplan-draft-v1",nd);
    setLogModal(null);
  };
  const updateDraft=(workoutId,data)=>{
    const nd={...logDraft,[workoutId]:data};
    setLogDraft(nd);save("myplan-draft-v1",nd);
  };
  const logMorning=()=>{
    const today=new Date().toISOString().split("T")[0];
    const updated={...logs,morning:[...(logs["morning"]||[]),{date:today}]};
    setLogs(updated);save("myplan-logs-v3",updated);
  };
  const addBw=(entry)=>{
    const updated=[...bwLog,entry];setBwLog(updated);save("myplan-bw-v1",updated);
  };

  const navItems=[
    {id:"home",label:"Workouts",icon:"🏋️"},
    {id:"morning",label:"Morning",icon:"🌅"},
    {id:"schedule",label:"Schedule",icon:"📅"},
    {id:"history",label:"History",icon:"📋"},
    {id:"body",label:"Weight",icon:"⚖️"},
  ];

  const titles={home:"Your Plan",morning:"Morning Flow",schedule:"Schedule",history:"History",body:"Body Weight"};
  const title=activeWorkout?activeWorkout.day:(titles[view]||"Your Plan");

  return(
    <div style={{height:"100%",width:"100%",display:"flex",flexDirection:"column",background:C.bg,color:C.text,fontFamily:"'DM Sans','Helvetica Neue',sans-serif",maxWidth:480,margin:"0 auto",overflow:"hidden"}}>

      {logModal&&(
        <LogModal
          workout={workouts.find(w=>w.id===logModal.workoutId)}
          existingLog={null}
          draft={logDraft[logModal.workoutId]||null}
          onDraftChange={data=>updateDraft(logModal.workoutId,data)}
          onSave={data=>saveLog(logModal.workoutId,data)}
          onClose={()=>setLogModal(null)}
        />
      )}

      {/* Top bar */}
      <div style={{flexShrink:0,background:`${C.bg}EE`,backdropFilter:"blur(12px)",borderBottom:`1px solid ${C.border}`,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>{title}</div>
          {view==="home"&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>Upper/Lower · Injury-modified</div>}
          {view==="morning"&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>~9 min · Slow & meditative</div>}
        </div>
        <div style={{display:"flex",gap:6}}>
          {totalMorning>0&&<div style={{background:`${C.purple}18`,border:`1px solid ${C.purple}40`,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,color:C.purple}}>🌅 {totalMorning}</div>}
          {totalGym>0&&<div style={{background:`${C.green}18`,border:`1px solid ${C.green}40`,borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,color:C.green}}>🔥 {totalGym}</div>}
        </div>
      </div>

      {/* Deload banner */}
      {showDeload&&(
        <div style={{flexShrink:0,background:`${C.red}18`,borderBottom:`1px solid ${C.red}30`,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:18}}>⚠️</span>
          <div style={{fontSize:13,color:C.text,lineHeight:1.4}}><span style={{fontWeight:700,color:C.red}}>Deload week due.</span> Drop all weights 40–50% for this week. You've earned it.</div>
        </div>
      )}

      {/* Content */}
      <div className="page">
        {view==="home"&&!activeWorkout&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            <div style={{background:`linear-gradient(135deg,${C.accent}22,transparent)`,border:`1px solid ${C.accent}30`,borderRadius:14,padding:"18px",marginBottom:20}}>
              <div style={{fontSize:12,color:C.accent,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Goal</div>
              <div style={{fontSize:15,lineHeight:1.6,color:C.text}}>Muscle growth + fat loss · Wrist, knee & ankle friendly · Progressive overload-driven</div>
            </div>
            <div style={{fontSize:12,color:C.muted,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Your Workouts</div>
            {workouts.map(w=>{
              const count=(logs[w.id]||[]).length;
              const hasDraft=!!logDraft[w.id];
              return(
                <button key={w.id} onClick={()=>setView(w.id)} style={{width:"100%",background:C.card,border:`1px solid ${hasDraft?C.accent+"50":C.border}`,borderRadius:12,padding:"16px",marginBottom:10,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14}}>
                  <div style={{width:48,height:48,borderRadius:12,background:`${w.color}20`,border:`1px solid ${w.color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{w.emoji}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:16,fontWeight:700,color:C.text}}>{w.day}</span>
                      <Badge tag={w.tag} color={w.color}/>
                      {hasDraft&&<span style={{fontSize:9,fontWeight:700,color:C.accent,background:`${C.accent}15`,border:`1px solid ${C.accent}30`,borderRadius:4,padding:"2px 6px",letterSpacing:"0.04em"}}>IN PROGRESS</span>}
                    </div>
                    <div style={{fontSize:12,color:C.muted}}>{w.exercises.length} exercises · {w.duration}</div>
                    {count>0&&<div style={{fontSize:11,color:C.accent,marginTop:2}}>📋 {count} session{count!==1?"s":""} logged</div>}
                  </div>
                  <span style={{color:C.dimmed,fontSize:18}}>›</span>
                </button>
              );
            })}
          </div>
        )}

        {activeWorkout&&<WorkoutView workout={activeWorkout} logs={logs} onBack={()=>setView("home")} onLog={()=>setLogModal({workoutId:activeWorkout.id})}/>}
        {view==="morning"&&<MorningView logs={logs} onLogMorning={logMorning}/>}

        {view==="schedule"&&(
          <div style={{animation:"fadeIn 0.3s ease"}}>
            {schedule.map((s,i)=>(
              <div key={i} onClick={()=>s.workoutId&&setView(s.workoutId)} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",marginBottom:8,background:s.workoutId?C.card:C.surface,border:`1px solid ${s.workoutId?C.dimmed:C.border}`,borderRadius:12,cursor:s.workoutId?"pointer":"default",opacity:s.workoutId?1:0.65}}>
                <div style={{width:44,textAlign:"center",color:s.workoutId?C.accent:C.muted,fontWeight:800,fontSize:12,letterSpacing:"0.06em"}}>{s.day}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,color:C.text,fontSize:15}}>{s.label}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{s.sub}</div></div>
                {s.workoutId?<span style={{color:C.dimmed}}>›</span>:<span style={{fontSize:18}}>😴</span>}
              </div>
            ))}
            <div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}25`,borderRadius:12,padding:"14px 16px",marginTop:8}}>
              <div style={{color:C.accent,fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Cardio (optional)</div>
              <div style={{color:C.text,fontSize:13,lineHeight:1.6}}>Wed & Sat: 25–35 min incline treadmill walk · 3.5–4 mph · 8–12% incline.</div>
            </div>
            <div style={{background:`${C.purple}10`,border:`1px solid ${C.purple}25`,borderRadius:12,padding:"14px 16px",marginTop:10}}>
              <div style={{color:C.purple,fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Morning Flow — Every Day</div>
              <div style={{color:C.text,fontSize:13,lineHeight:1.6}}>~9 minutes, right after waking. Pairs well before gym days to warm up the joints.</div>
            </div>
          </div>
        )}

        {view==="history"&&<HistoryView logs={logs}/>}
        {view==="body"&&<WeightTracker bwLog={bwLog} onAdd={addBw}/>}
      </div>

      {/* Nav */}
      <nav style={{flexShrink:0,background:`${C.surface}F8`,backdropFilter:"blur(16px)",borderTop:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",padding:"8px 0 18px"}}>
        {navItems.map(n=>{
          const active=view===n.id||(n.id==="home"&&!!activeWorkout);
          return(
            <button key={n.id} onClick={()=>setView(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0"}}>
              <span style={{fontSize:18}}>{n.icon}</span>
              <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.04em",textTransform:"uppercase",color:active?C.accent:C.muted,transition:"color 0.15s"}}>{n.label}</span>
              {active&&<div style={{width:14,height:2,background:C.accent,borderRadius:1}}/>}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
