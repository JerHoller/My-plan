// ── Storage ────────────────────────────────────────────────────
function loadData(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveData(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ── Shared Components ──────────────────────────────────────────
function Badge({ tag, color }) {
  return <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", padding: "3px 8px", borderRadius: 4, border: `1px solid ${color}33`, color, background: `${color}15` }}>{tag}</span>;
}

// ── Morning Routine: Guided Mode ───────────────────────────────
function GuidedRoutine({ onClose, onComplete }) {
  const [step, setStep] = useState(0);
  const [timeLeft, setTimeLeft] = useState(morningMoves[0].duration);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);
  const move = morningMoves[step];

  useEffect(() => {
    setTimeLeft(morningMoves[step].duration);
    setRunning(false);
    clearInterval(intervalRef.current);
  }, [step]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    } else clearInterval(intervalRef.current);
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const progress = 1 - timeLeft / move.duration;
  const mins = Math.floor(timeLeft / 60);
  const secs = String(timeLeft % 60).padStart(2, "0");

  const next = () => {
    if (step < morningMoves.length - 1) setStep(s => s + 1);
    else { setDone(true); onComplete && onComplete(); }
  };

  if (done) return (
    <div style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 200, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, animation: "fadeIn 0.4s ease" }}>
      <div style={{ fontSize: 72, marginBottom: 24 }}>🌅</div>
      <div style={{ fontSize: 28, fontWeight: 800, color: C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 12 }}>Morning complete.</div>
      <div style={{ fontSize: 15, color: C.muted, textAlign: "center", lineHeight: 1.7, marginBottom: 40 }}>You gave your body what it needed before the day even started. That's the move.</div>
      <button onClick={onClose} style={{ background: C.accent, border: "none", color: C.bg, fontWeight: 800, fontSize: 16, padding: "16px 40px", borderRadius: 14, cursor: "pointer" }}>Done</button>
    </div>
  );

  // Circumference for SVG circle
  const R = 54;
  const circ = 2 * Math.PI * R;

  return (
    <div style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 200, display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 12, background: C.surface }}>
        <button onClick={onClose} style={{ background: C.dimmed, border: "none", color: C.muted, width: 36, height: 36, borderRadius: 8, cursor: "pointer", fontSize: 16 }}>✕</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 800, fontSize: 15, color: C.text }}>Morning Flow</div>
          <div style={{ fontSize: 11, color: C.muted }}>Move {step + 1} of {morningMoves.length}</div>
        </div>
        {/* Mini progress dots */}
        <div style={{ display: "flex", gap: 4 }}>
          {morningMoves.map((_, i) => (
            <div key={i} style={{ width: i === step ? 16 : 6, height: 6, borderRadius: 3, background: i < step ? C.accent : i === step ? C.purple : C.dimmed, transition: "all 0.3s" }} />
          ))}
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "24px 20px 100px" }}>
        {/* Move header */}
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 56, marginBottom: 12 }}>{move.emoji}</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: C.text, fontFamily: "'DM Sans', sans-serif", marginBottom: 8 }}>{move.name}</div>
          <Badge tag={move.category} color={C.purple} />
        </div>

        {/* Timer circle */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 28 }}>
          <div style={{ position: "relative", width: 140, height: 140 }}>
            <svg width="140" height="140" style={{ transform: "rotate(-90deg)" }}>
              <circle cx="70" cy="70" r={R} fill="none" stroke={C.dimmed} strokeWidth="6" />
              <circle cx="70" cy="70" r={R} fill="none" stroke={running ? C.purple : C.muted} strokeWidth="6"
                strokeDasharray={circ} strokeDashoffset={circ * (1 - progress)}
                strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} />
            </svg>
            <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style={{ fontSize: 30, fontWeight: 800, color: running ? C.text : C.muted, fontFamily: "'DM Sans', sans-serif" }}>{mins > 0 ? `${mins}:${secs}` : `${timeLeft}s`}</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>remaining</div>
            </div>
          </div>
        </div>

        {/* Controls */}
        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginBottom: 28 }}>
          <button onClick={() => setRunning(r => !r)} style={{
            background: running ? `${C.purple}22` : C.purple, border: `1px solid ${C.purple}60`,
            color: running ? C.purple : C.bg, fontWeight: 800, fontSize: 14,
            padding: "12px 28px", borderRadius: 10, cursor: "pointer",
            animation: running ? "none" : "pulse 2s infinite",
          }}>{running ? "⏸ Pause" : timeLeft < move.duration ? "▶ Resume" : "▶ Start"}</button>
          <button onClick={next} style={{ background: C.card, border: `1px solid ${C.border}`, color: C.muted, fontWeight: 700, fontSize: 14, padding: "12px 20px", borderRadius: 10, cursor: "pointer" }}>
            {step < morningMoves.length - 1 ? "Skip →" : "Finish ✓"}
          </button>
        </div>

        {/* Description */}
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "18px", marginBottom: 12 }}>
          <div style={{ color: C.purple, fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>How to do it</div>
          <div style={{ color: C.text, fontSize: 14, lineHeight: 1.7 }}>{move.description}</div>
        </div>

        <div style={{ background: `${C.accent}0E`, border: `1px solid ${C.accent}25`, borderRadius: 12, padding: "14px 16px", marginBottom: 12 }}>
          <div style={{ color: C.accent, fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Cue</div>
          <div style={{ color: C.text, fontSize: 13, lineHeight: 1.5 }}>{move.cue}</div>
        </div>

        <div style={{ background: `${C.gold}0E`, border: `1px solid ${C.gold}25`, borderRadius: 12, padding: "14px 16px" }}>
          <div style={{ color: C.gold, fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Why it matters</div>
          <div style={{ color: C.text, fontSize: 13, lineHeight: 1.5 }}>{move.benefit}</div>
        </div>
      </div>
    </div>
  );
}

  const [guided, setGuided] = useState(false);
  const [expandedMove, setExpandedMove] = useState(null);
  const totalTime = morningMoves.reduce((a, m) => a + m.duration, 0);
  const morningLogs = logs["morning"] || [];
  const todayStr = new Date().toISOString().split("T")[0];
  const doneTodayAlready = morningLogs.some(l => l.date === todayStr);

  const handleComplete = () => {
    onLogMorning();
    setGuided(false);
  };

  if (guided) return <GuidedRoutine onClose={() => setGuided(false)} onComplete={handleComplete} />;

  return (
    <div style={{ animation: "fadeIn 0.3s ease" }}>
      {/* Hero card */}
      <div style={{ background: `linear-gradient(135deg, ${C.purple}25, ${C.surface})`, border: `1px solid ${C.purple}35`, borderRadius: 16, padding: "22px", marginBottom: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <span style={{ fontSize: 36 }}>🌅</span>
          <div>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.text, fontFamily: "'DM Sans', sans-serif" }}>Morning Flow</div>

// ── Log Modal ──────────────────────────────────────────────────
function LogModal({ workout, existingLog, onSave, onClose }) {
  const today = new Date().toISOString().split("T")[0];
  const [date, setDate] = useState(existingLog?.date || today);
  const [notes, setNotes] = useState(existingLog?.notes || "");
  const [sets, setSets] = useState(() => {
    if (existingLog?.sets) return existingLog.sets;
    return workout.exercises.map(ex => Array.from({ length: ex.sets }, () => ({ weight: "", reps: "", done: false })));
  });
  const [energy, setEnergy] = useState(existingLog?.energy || 3);

  const updateSet = (exI, setI, field, val) => {
    setSets(prev => {
      const next = prev.map(e => [...e]);
      next[exI] = next[exI].map((s, i) => i === setI ? { ...s, [field]: val } : s);
      return next;
    });
  };
  const toggleDone = (exI, setI) => {
    setSets(prev => {
      const next = prev.map(e => [...e]);
      next[exI] = next[exI].map((s, i) => i === setI ? { ...s, done: !s.done } : s);
      return next;
    });
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", flexDirection: "column", background: C.bg }}>
      <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 12, background: C.surface }}>
        <button onClick={onClose} style={{ background: C.dimmed, border: "none", color: C.muted, width: 36, height: 36, borderRadius: 8, cursor: "pointer", fontSize: 16 }}>✕</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 800, fontSize: 16, color: C.text }}>Log Session</div>
          <div style={{ fontSize: 12, color: C.muted }}>{workout.day}</div>
        </div>
        <button onClick={() => onSave({ date, notes, sets, energy })} style={{ background: C.accent, border: "none", color: C.bg, fontWeight: 800, fontSize: 13, padding: "8px 16px", borderRadius: 8, cursor: "pointer" }}>Save</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
          <div>
            <div style={{ fontSize: 10, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>Date</div>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", color: C.text, fontSize: 13 }} />
          </div>
          <div>
            <div style={{ fontSize: 10, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>Energy (1–5)</div>
            <div style={{ display: "flex", gap: 4 }}>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => setEnergy(n)} style={{ flex: 1, height: 38, background: energy >= n ? `${C.gold}30` : C.card, border: `1px solid ${energy >= n ? C.gold+"60" : C.border}`, borderRadius: 6, color: energy >= n ? C.gold : C.muted, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{n}</button>
              ))}
            </div>
          </div>
        </div>
        {workout.exercises.map((ex, exI) => (
          <div key={exI} style={{ marginBottom: 14, background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden" }}>
            <div style={{ padding: "12px 14px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontWeight: 700, color: C.text, fontSize: 13 }}>{ex.name}</div>
              <div style={{ fontSize: 11, color: C.muted }}>{ex.sets} × {ex.reps}</div>
            </div>
            <div style={{ padding: "10px 14px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 1fr 36px", gap: 6, marginBottom: 6 }}>
                <div style={{ fontSize: 10, color: C.muted, textAlign: "center" }}>SET</div>
                <div style={{ fontSize: 10, color: C.muted, textAlign: "center" }}>WEIGHT</div>
                <div style={{ fontSize: 10, color: C.muted, textAlign: "center" }}>REPS</div>
                <div />
              </div>
              {sets[exI].map((s, setI) => (
                <div key={setI} style={{ display: "grid", gridTemplateColumns: "28px 1fr 1fr 36px", gap: 6, marginBottom: 6, alignItems: "center" }}>
                  <div style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: s.done ? C.accent : C.muted }}>{setI + 1}</div>
                  <input type="number" placeholder="lb" value={s.weight} onChange={e => updateSet(exI, setI, "weight", e.target.value)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "9px 10px", color: C.text, fontSize: 14, fontWeight: 600, textAlign: "center", width: "100%" }} />
                  <input type="number" placeholder="reps" value={s.reps} onChange={e => updateSet(exI, setI, "reps", e.target.value)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 7, padding: "9px 10px", color: C.text, fontSize: 14, fontWeight: 600, textAlign: "center", width: "100%" }} />
                  <button onClick={() => toggleDone(exI, setI)} style={{ width: 36, height: 36, borderRadius: 8, border: `1px solid ${s.done ? C.accent+"60" : C.border}`, background: s.done ? `${C.accent}25` : C.surface, color: s.done ? C.accent : C.muted, cursor: "pointer", fontSize: 14 }}>✓</button>
                </div>
              ))}
            </div>
          </div>
        ))}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 10, color: C.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>Session Notes</div>
          <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="How did it feel? Any PRs? Anything to note..." rows={3} style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", color: C.text, fontSize: 13, lineHeight: 1.5, resize: "none" }} />
        </div>
      </div>
    </div>
  );
}

      <button onClick={() => setOpen(!open)} style={{ width: "100%", background: "none", border: "none", padding: "14px 16px", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 12 }}>

// ── Workout View ───────────────────────────────────────────────
function WorkoutView({ workout, logs, onBack, onLog }) {
  const workoutLogs = logs[workout.id] || [];
  const lastSession = workoutLogs[workoutLogs.length - 1];
  const getLastSetLog = (exIndex) => {
    if (!lastSession?.sets?.[exIndex]) return null;
    const done = lastSession.sets[exIndex].filter(s => s.done && s.weight);
    return done.length > 0 ? done[done.length - 1] : null;
  };
  return (
    <div style={{ animation: "fadeIn 0.25s ease" }}>
      <div style={{ background: `linear-gradient(135deg, ${workout.color}22, ${C.surface})`, border: `1px solid ${workout.color}30`, borderRadius: 14, padding: "20px", marginBottom: 16 }}>
        <button onClick={onBack} style={{ background: C.dimmed, border: "none", color: C.muted, padding: "6px 12px", borderRadius: 6, fontSize: 12, cursor: "pointer", marginBottom: 14 }}>← Back</button>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <span style={{ fontSize: 28 }}>{workout.emoji}</span>
          <div>
            <div style={{ color: C.text, fontSize: 22, fontWeight: 800, fontFamily: "'DM Sans', sans-serif" }}>{workout.day}</div>
            <Badge tag={workout.tag} color={workout.color} />
          </div>
        </div>
        <div style={{ color: C.muted, fontSize: 13, marginTop: 8, lineHeight: 1.5 }}>{workout.focus}</div>
        <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
          <div style={{ background: C.card, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: C.text }}>⏱ {workout.duration}</div>
          <div style={{ background: C.card, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: C.text }}>🏋️ {workout.exercises.length} exercises</div>
          {workoutLogs.length > 0 && <div style={{ background: C.card, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: C.accent }}>📋 {workoutLogs.length} logged</div>}
        </div>
      </div>
      <button onClick={onLog} style={{ width: "100%", background: `linear-gradient(135deg, ${C.accent}, ${C.accentDim})`, border: "none", borderRadius: 12, padding: "16px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 16, boxShadow: `0 4px 20px ${C.accent}30` }}>
        <span style={{ fontSize: 20 }}>📝</span>
        <span style={{ fontWeight: 800, fontSize: 15, color: C.bg, fontFamily: "'DM Sans', sans-serif" }}>Log This Session</span>
      </button>
      {lastSession && (
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>🕐</span>
          <div>
            <div style={{ fontSize: 12, color: C.muted }}>Last session</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{new Date(lastSession.date + "T12:00:00").toLocaleDateString("en-CA", { weekday: "short", month: "short", day: "numeric" })}</div>
          </div>
        </div>
      )}
      {workout.exercises.map((ex, i) => <ExerciseCard key={i} ex={ex} index={i} lastLog={getLastSetLog(i)} />)}
    </div>
  );
}

// ── History View ───────────────────────────────────────────────
function HistoryView({ logs, onEditLog }) {
  const allSessions = Object.entries(logs)
    .filter(([id]) => id !== "morning")
    .flatMap(([workoutId, sessions]) => sessions.map((s, idx) => ({ ...s, workoutId, sessionIdx: idx, workout: workouts.find(w => w.id === workoutId) })))
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  const morningLogs = (logs["morning"] || []).sort((a, b) => new Date(b.date) - new Date(a.date));

  if (allSessions.length === 0 && morningLogs.length === 0) {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px", color: C.muted }}>
        <div style={{ fontSize: 48, marginBottom: 16 }}>📋</div>
        <div style={{ fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 8 }}>No sessions yet</div>
        <div style={{ fontSize: 13, lineHeight: 1.6 }}>Log a workout or complete your morning flow to see your history here.</div>
      </div>
    );
  }

  return (
    <div>
      {morningLogs.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>🌅 Morning Flow · {morningLogs.length} completed</div>
          {morningLogs.slice(0, 5).map((l, i) => (
            <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 16px", marginBottom: 8, display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 20 }}>🌅</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, color: C.text, fontSize: 13 }}>Morning Flow</div>
                <div style={{ fontSize: 12, color: C.muted }}>{new Date(l.date + "T12:00:00").toLocaleDateString("en-CA", { weekday: "short", month: "short", day: "numeric" })}</div>
              </div>
              <div style={{ fontSize: 16, color: C.purple }}>✓</div>
            </div>
          ))}
        </div>
      )}

      {allSessions.length > 0 && (
        <div>
          <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 10 }}>🏋️ Gym Sessions · {allSessions.length} logged</div>
          {allSessions.map((s, i) => {
            const w = s.workout;
            if (!w) return null;
            const totalDone = s.sets ? s.sets.flat().filter(x => x.done).length : 0;
            const totalPossible = s.sets ? s.sets.flat().length : 0;
            return (
              <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 22 }}>{w.emoji}</span>
                    <div>
                      <div style={{ fontWeight: 700, color: C.text, fontSize: 14 }}>{w.day}</div>
                      <div style={{ fontSize: 12, color: C.muted }}>{new Date(s.date + "T12:00:00").toLocaleDateString("en-CA", { weekday: "short", month: "short", day: "numeric" })}</div>
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: C.gold }}>{"★".repeat(s.energy || 0)}</div>
                </div>
                <div style={{ marginBottom: s.notes ? 8 : 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 11, color: C.muted }}>Sets completed</span>
                    <span style={{ fontSize: 11, color: totalDone === totalPossible ? C.accent : C.muted, fontWeight: 700 }}>{totalDone}/{totalPossible}</span>
                  </div>
                  <div style={{ height: 4, background: C.dimmed, borderRadius: 2 }}>
                    <div style={{ height: "100%", width: `${totalPossible ? (totalDone / totalPossible) * 100 : 0}%`, background: totalDone === totalPossible ? C.accent : C.blue, borderRadius: 2 }} />
                  </div>
                </div>
                {s.notes && <div style={{ fontSize: 12, color: C.muted, fontStyle: "italic", marginTop: 8, lineHeight: 1.5 }}>"{s.notes}"</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("home");
  const [logs, setLogs] = useState(() => loadData("workout-logs-v2", {}));
  const [logModal, setLogModal] = useState(null);

  const activeWorkout = workouts.find(w => w.id === view);

  const saveLog = (workoutId, editIndex, data) => {
    const updated = { ...logs, [workoutId]: [...(logs[workoutId] || [])] };
    if (editIndex !== null) updated[workoutId][editIndex] = { ...updated[workoutId][editIndex], ...data };
    else updated[workoutId].push(data);
    setLogs(updated);
    saveData("workout-logs-v2", updated);
    setLogModal(null);
  };

  const logMorning = () => {
    const today = new Date().toISOString().split("T")[0];
    const updated = { ...logs, morning: [...(logs["morning"] || []), { date: today }] };
    setLogs(updated);
    saveData("workout-logs-v2", updated);
  };

  const totalGym = Object.entries(logs).filter(([k]) => k !== "morning").reduce((a, [, v]) => a + v.length, 0);
  const totalMorning = (logs["morning"] || []).length;

  const navItems = [
    { id: "home", label: "Workouts", icon: "🏋️" },
    { id: "morning", label: "Morning", icon: "🌅" },
    { id: "schedule", label: "Schedule", icon: "📅" },
    { id: "history", label: "History", icon: "📋" },
    { id: "guidelines", label: "Guide", icon: "📖" },
  ];

  const getTitle = () => {
    if (activeWorkout) return activeWorkout.day;
    const titles = { home: "Your Plan", morning: "Morning Flow", schedule: "Schedule", history: "History", guidelines: "Guidelines" };
    return titles[view] || "Your Plan";
  };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'DM Sans', 'Helvetica Neue', sans-serif", maxWidth: 480, margin: "0 auto", paddingBottom: 88 }}>
      {logModal && (
        <LogModal
          workout={workouts.find(w => w.id === logModal.workoutId)}
          existingLog={logModal.existingLog}
          onSave={data => saveLog(logModal.workoutId, logModal.editIndex, data)}
          onClose={() => setLogModal(null)}
        />
      )}

      {/* Top bar */}
      <div style={{ position: "sticky", top: 0, zIndex: 10, background: `${C.bg}EE`, backdropFilter: "blur(12px)", borderBottom: `1px solid ${C.border}`, padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: C.text }}>{getTitle()}</div>
          {view === "home" && <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>Upper/Lower · Injury-modified</div>}
          {view === "morning" && <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>~9 min · Slow & meditative</div>}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          {totalMorning > 0 && <div style={{ background: `${C.purple}18`, border: `1px solid ${C.purple}40`, borderRadius: 8, padding: "5px 10px", fontSize: 11, fontWeight: 700, color: C.purple }}>🌅 {totalMorning}</div>}
          {totalGym > 0 && <div style={{ background: `${C.green}18`, border: `1px solid ${C.green}40`, borderRadius: 8, padding: "5px 10px", fontSize: 11, fontWeight: 700, color: C.green }}>🔥 {totalGym}</div>}
        </div>
      </div>

      <div style={{ padding: "20px 16px" }}>
        {/* HOME */}
        {view === "home" && !activeWorkout && (
          <div style={{ animation: "fadeIn 0.3s ease" }}>
            <div style={{ background: `linear-gradient(135deg, ${C.accent}22, transparent)`, border: `1px solid ${C.accent}30`, borderRadius: 14, padding: "18px", marginBottom: 20 }}>
              <div style={{ fontSize: 12, color: C.accent, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Goal</div>
              <div style={{ fontSize: 15, lineHeight: 1.6, color: C.text }}>Muscle growth + fat loss · Wrist, knee & ankle friendly · Progressive overload-driven</div>
            </div>
            <div style={{ fontSize: 12, color: C.muted, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 12 }}>Your Workouts</div>
            {workouts.map(w => {
              const count = (logs[w.id] || []).length;
              return (
                <button key={w.id} onClick={() => setView(w.id)} style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px", marginBottom: 10, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ width: 48, height: 48, borderRadius: 12, background: `${w.color}20`, border: `1px solid ${w.color}30`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{w.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{w.day}</span>
                      <Badge tag={w.tag} color={w.color} />
                    </div>
                    <div style={{ fontSize: 12, color: C.muted }}>{w.exercises.length} exercises · {w.duration}</div>
                    {count > 0 && <div style={{ fontSize: 11, color: C.accent, marginTop: 2 }}>📋 {count} session{count !== 1 ? "s" : ""} logged</div>}
                  </div>
                  <span style={{ color: C.dimmed, fontSize: 18 }}>›</span>
                </button>
              );
            })}
          </div>
        )}

        {/* WORKOUT */}
        {activeWorkout && (
          <WorkoutView workout={activeWorkout} logs={logs} onBack={() => setView("home")} onLog={() => setLogModal({ workoutId: activeWorkout.id, editIndex: null, existingLog: null })} />
        )}

        {/* MORNING */}
        {view === "morning" && <MorningView logs={logs} onLogMorning={logMorning} />}

        {/* SCHEDULE */}
        {view === "schedule" && (
          <div style={{ animation: "fadeIn 0.3s ease" }}>
            {schedule.map((s, i) => (
              <div key={i} onClick={() => s.workoutId && setView(s.workoutId)} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", marginBottom: 8, background: s.workoutId ? C.card : C.surface, border: `1px solid ${s.workoutId ? C.dimmed : C.border}`, borderRadius: 12, cursor: s.workoutId ? "pointer" : "default", opacity: s.workoutId ? 1 : 0.65 }}>
                <div style={{ width: 44, textAlign: "center", color: s.workoutId ? C.accent : C.muted, fontWeight: 800, fontSize: 12, letterSpacing: "0.06em" }}>{s.day}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, color: C.text, fontSize: 15 }}>{s.label}</div>
                  <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{s.sub}</div>
                </div>
                {s.workoutId ? <span style={{ color: C.dimmed }}>›</span> : <span style={{ fontSize: 18 }}>😴</span>}
              </div>
            ))}
            <div style={{ background: `${C.accent}10`, border: `1px solid ${C.accent}25`, borderRadius: 12, padding: "14px 16px", marginTop: 8 }}>
              <div style={{ color: C.accent, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Cardio (optional)</div>
              <div style={{ color: C.text, fontSize: 13, lineHeight: 1.6 }}>Wed & Sat: 25–35 min incline treadmill walk · 3.5–4 mph · 8–12% incline.</div>
            </div>
            <div style={{ background: `${C.purple}10`, border: `1px solid ${C.purple}25`, borderRadius: 12, padding: "14px 16px", marginTop: 10 }}>
              <div style={{ color: C.purple, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Morning Flow — Every Day</div>
              <div style={{ color: C.text, fontSize: 13, lineHeight: 1.6 }}>~9 minutes, right after waking. Pairs especially well before gym days to warm up the joints.</div>
            </div>
          </div>
        )}

        {/* HISTORY */}
        {view === "history" && <HistoryView logs={logs} onEditLog={(workoutId, idx, s) => setLogModal({ workoutId, editIndex: idx, existingLog: s })} />}

        {/* GUIDELINES */}
        {view === "guidelines" && (
          <div style={{ animation: "fadeIn 0.3s ease" }}>
            <div style={{ background: `linear-gradient(135deg, ${C.red}15, transparent)`, border: `1px solid ${C.red}25`, borderRadius: 14, padding: "16px", marginBottom: 16 }}>
              <div style={{ color: C.red, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Progressive Overload — The Only Rule</div>
              <div style={{ color: C.text, fontSize: 13, lineHeight: 1.6 }}>Hit the top of your rep range on ALL sets → add weight next session. Log every session — guessing kills progress.</div>
            </div>
            {guidelines.map((g, i) => (
              <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "14px 16px", marginBottom: 8, display: "flex", gap: 14, alignItems: "flex-start" }}>
                <span style={{ fontSize: 20, flexShrink: 0, marginTop: 1 }}>{g.icon}</span>
                <div>
                  <div style={{ fontWeight: 700, color: C.text, fontSize: 13, marginBottom: 3 }}>{g.label}</div>
                  <div style={{ color: C.muted, fontSize: 13, lineHeight: 1.5 }}>{g.value}</div>
                </div>
              </div>
            ))}
            <div style={{ background: `${C.gold}10`, border: `1px solid ${C.gold}25`, borderRadius: 12, padding: "14px 16px", marginTop: 8 }}>
              <div style={{ color: C.gold, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>How Long to Run This Plan</div>
              <div style={{ color: C.text, fontSize: 13, lineHeight: 1.6 }}>Minimum <strong style={{ color: C.gold }}>12 weeks</strong>. Real muscle growth kicks in around weeks 4–6. Only switch when you plateau on multiple lifts for 2+ weeks. The Upper/Lower structure can carry you for years.</div>
            </div>
          </div>
        )}
      </div>

      {/* Bottom nav */}
      <nav style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: `${C.surface}F8`, backdropFilter: "blur(16px)", borderTop: `1px solid ${C.border}`, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", padding: "8px 0 16px" }}>
        {navItems.map(n => {
          const active = view === n.id || (n.id === "home" && !!activeWorkout);
          return (
            <button key={n.id} onClick={() => setView(n.id)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "4px 0" }}>
              <span style={{ fontSize: 18 }}>{n.icon}</span>
              <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase", color: active ? C.accent : C.muted, transition: "color 0.15s" }}>{n.label}</span>
              {active && <div style={{ width: 14, height: 2, background: C.accent, borderRadius: 1 }} />}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
